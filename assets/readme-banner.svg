<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Tanetsumi no Uta bilingual subtitle patch</title>
  <desc id="desc">A Chinese and Japanese bilingual subtitle patch banner for Tanetsumi no Uta.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfeeff"/>
      <stop offset="0.52" stop-color="#fff7df"/>
      <stop offset="1" stop-color="#f4c7b4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#284566"/>
      <stop offset="1" stop-color="#7d3b36"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3b2d25" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#sky)"/>
  <circle cx="998" cy="86" r="142" fill="#ffffff" opacity="0.34"/>
  <circle cx="1038" cy="92" r="92" fill="#fff3c8" opacity="0.45"/>
  <path d="M0 314 C168 280 248 342 406 305 C548 272 658 240 812 288 C968 337 1056 310 1200 270 L1200 420 L0 420 Z" fill="#6fa78f" opacity="0.38"/>
  <path d="M0 346 C158 317 268 365 418 337 C591 304 704 314 846 354 C1002 398 1092 359 1200 335 L1200 420 L0 420 Z" fill="#355c5f" opacity="0.28"/>
  <g filter="url(#shadow)">
