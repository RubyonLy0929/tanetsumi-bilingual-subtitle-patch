    <rect x="82" y="66" width="1036" height="288" rx="24" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.75"/>
  </g>
  <text x="120" y="145" font-family="'Noto Serif CJK SC','Source Han Serif SC','Yu Mincho','Times New Roman',serif" font-size="46" font-weight="700" fill="url(#ink)">播种之谣 / たねつみの歌</text>
  <text x="120" y="207" font-family="'Noto Sans CJK SC','Microsoft YaHei','Meiryo',sans-serif" font-size="58" font-weight="800" fill="#27384d">日中双语字幕补丁</text>
  <text x="124" y="258" font-family="'Noto Sans CJK SC','Microsoft YaHei','Meiryo',sans-serif" font-size="30" fill="#5f5148">Japanese main subtitles + Simplified Chinese support subtitles</text>
